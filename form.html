    <h1>STUDENT REGISTRATION FORM</h1>

<fieldset>
       <legend>Personal Information</legend>
       <label>Name:</label>
       <input type="text" placeholder="Enter your name" minlength='5' maxlength='100' required>
       <br><br>
       <label>Email:</label>
    <input type="email" placeholder="Enter your email" required>
    <br><br>
    <label>Address:</label>
    <input type="text" placeholder="Enter your address">
<br><br>
    <label>School:</label>
    <input type="text" placeholder="Enter your school" required> 
      <br><br>   
      <label>Phone:</label>
    <input type="number" placeholder="Enter your phone no." required>
    <br><br>
     <label>Password:</label>
    <input type="password" placeholder="Enter your password" minlength="8" required>
    <br><br>
     <label>Date of Birth:</label>
    <input type="date" placeholder="Enter your date of birth" required>
    <br><br>

   <label>Hobbies:</label>
    <br>
    <input type="checkbox" id="Sports" name="hobby" value="Sports">
    <label for="Sports">Sports</label>
    <br>
    <input type="checkbox" id="Sports" name="hobby" value="Music">
    <label for="Music">Music</label>
    <br>
    <input type="checkbox" id="Sports" name="hobby" value="Dancing">
    <label for="Dancing">Dancing</label>
    <br>
    <input type="checkbox" id="Sports" name="hobby" value="Reading">
    <label for="Reading">Reading</label>
    <br>
    <input type="checkbox" id="Sports" name="hobby" value="Cooking">
    <label for="Cooking">Cooking</label>
    <br>
    <input type="checkbox" id="Sports" name="hobby" value="Coding">
    <label for="Coding">Coding</label>
    <br>
    <input type="checkbox" id="Football" name="hobby" value="Baking">
    <label for="Baking">Baking</label>
    <br><br>

    <button type="submit"><a href="success.html">Submit</a></button>
</body>
</html>
