<!DOCTYPE html>

            <td>Business</td>
            <td>Texas</td>
        </tr>
        <tr>
            <td colspan="2">Carol</td>
            <td>Engineering</td>
            <td>Florida</td>
        </tr>
        <tr>
            <td>David</td>
            <td>19</td>
            <td rowspan="2">Mathematics</td>

        </tr>
        <tr>
            <td>Emma</td>

            <td>Illinois</td>

    </table>
</body>
</html>
